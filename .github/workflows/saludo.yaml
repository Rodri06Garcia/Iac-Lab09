name: Demostración de un pipeline de GithubActions

on:
  push:
    branches:
      - main
      - develop

env:
  NOMBRE: "Rodrigo Garcia"

jobs:
  saludo:
    runs-on: ubuntu-latest

    steps:
      - name: Saludo desde main
        if: github.ref == 'refs/heads/main'
        run: echo "Hola desde main, mi nombre es ${{env.NOMBRE}}"

      - name: Saludo desde develop
        if: github.ref == 'refs/heads/develop'
        run: echo "Hola desde develop, mi nombre es ${{env.NOMBRE}}"
