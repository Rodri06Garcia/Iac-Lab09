name: Demostración de un pipeline de GithubActions

on:
  push:
    branches:
      - main
      - develop

jobs:
  saludo:
    runs-on: ubuntu-latest
    env:
      NOMBRE_ESTUDIANTE: "Rodrigo Garcia" 

    steps:
      - name: Saludo desde main
        if: github.ref == 'refs/heads/main'
        run: echo "Hola desde main, mi nombre es ${{ env.NOMBRE_ESTUDIANTE }}"

      - name: Saludo desde develop
        if: github.ref == 'refs/heads/develop'
        run: echo "Hola desde develop, mi nombre es ${{ env.NOMBRE_ESTUDIANTE }}"
